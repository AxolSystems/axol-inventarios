name: axol_inventarios
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=2.19.6 <3.0.0'

dependencies:
  csv: ^5.1.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.2
  flutter_box_transform: ^0.4.4
  flutter_markdown: ^0.6.19
  intl: ^0.19.0
  path_provider: ^2.0.15
  pdf: ^3.10.4
  popover: ^0.3.0
  printing: ^5.11.0
  resizable_widget: ^1.0.5
  shared_preferences: ^2.1.0
  shimmer: ^3.0.0
  spelling_number: ^0.0.4
  supabase_flutter: ^1.8.1
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Medium.ttf
          weight: 400
        - asset: fonts/Poppins-Regular.ttf
          weight: 500
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Source Sans Pro
      fonts:
        - asset: fonts/SourceSansPro-Regular.ttf
          weight: 400
        - asset: fonts/SourceSansPro-SemiBold.ttf
          weight: 600

  assets:
    - assets/images/axolLogo.png
    - assets/images/logoAxol2.png
    - assets/images/logo_jj.png